name: Deploy Publish Site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Swift (compatible with Xcode 16.4)
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: "5.10"

      # 3. Clean cache (fix module / SDK issue)
      - name: Clean Swift & Xcode cache
        run: |
          rm -rf ~/.swiftpm
          rm -rf ~/Library/Caches/com.apple.dt.Xcode
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf .build

      # 4. Resolve dependencies
      - name: Resolve dependencies
        run: swift package resolve

      # 5. Debug info (optional tapi bagus untuk awal)
      - name: Debug Swift Environment
        run: |
          swift --version
          swift build

      # 6. Generate Publish website
      - name: Generate website
        run: swift run publish generate

      # 7. Deploy ke gh-pages
      - name: Deploy to GitHub Pages
        run: |
          cd Output
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy site" || echo "No changes to commit"
          git branch -M gh-pages
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/AstvatEreta-Lens/ahmadalwabil.git
          git push -f origin gh-pages
