name: Deploy Publish Site

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: "5.9"

      - name: Generate website
        run: swift run publish generate

      - name: Deploy to GitHub Pages
        run: |
          cd Output
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy site" || echo "No changes to commit"
          git branch -M gh-pages
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/AstvatEreta-Lens/ahmadalwabil.git
          git push -f origin gh-pages
