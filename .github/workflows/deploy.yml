name: Deploy Publish Site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Debug Swift version (lihat versi bawaan runner)
      - name: Check Swift version
        run: swift --version

      # 3. Clean cache (fix Xcode module issue)
      - name: Clean Swift & Xcode cache
        run: |
          rm -rf ~/.swiftpm
          rm -rf ~/Library/Caches/com.apple.dt.Xcode
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf .build

      # 4. Resolve dependencies
      - name: Resolve dependencies
        run: swift package resolve

      # 5. Build (optional debug, bisa dihapus nanti)
      - name: Build project
        run: swift build

      # 6. Generate Publish website
      - name: Generate website
        run: swift run MyWeb publish generate

      # 7. Deploy ke gh-pages
      - name: Deploy to GitHub Pages
        run: |
          cd Output
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy site" || echo "No changes to commit"
          git branch -M gh-pages
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/AstvatEreta-Lens/ahmadalwabil.git
          git push -f origin gh-pages
